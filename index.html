<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>Test-1 微信网页</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="header-title">Test-1</div>
        <div class="header-subtitle">Just for test</div>
      </header>
      <main class="content">
        <section class="card">
          <h1>欢迎来到微信网页</h1>
          <p>这是一个基于你上传文件内容生成的简单网页。</p>
          <p>你可以把这个文件部署到 HTTPS 静态站点，然后在微信内打开它。</p>
        </section>
        <section class="card">
          <h2>网页内容</h2>
          <p><strong>项目名：</strong>Test-1</p>
          <p><strong>说明：</strong>Just for test</p>
        </section>
        <section class="card">
          <h2>使用说明</h2>
          <ol>
            <li>把 `index.html` 和 `style.css` 上传到你的静态网站服务器。</li>
            <li>确保地址是 HTTPS 链接。</li>
            <li>在微信聊天窗口中打开该链接即可查看。</li>
          </ol>
        </section>
      </main>
      <footer class="footer">微信浏览器兼容简单页面，支持移动端展示。</footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
